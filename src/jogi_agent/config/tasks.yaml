jogi_kutatasi_feladat:
  description: >
    Végezzen célzott kutatást a(z) {topic} témakörben a rendelkezésre álló jogi adatbázisok (Mt., Ptk., GDPR) alapján. 
    Használja a keresőeszközt a legrelevánsabb törvényi szakaszok, paragrafusok és szabályozási pontok azonosításához. 
    Kiemelten ügyeljen a források pontosságára és a normaszöveg hiteles visszaadására.
  expected_output: >
    Egy strukturált jegyzék a feltárt jogszabályi helyekről, amely tartalmazza a pontos törvényi hivatkozásokat 
    és a hozzájuk tartozó releváns szövegrészleteket.
  agent: jogi_kutato_specialista

jogi_tanacsadoi_feladat:
  description: >
    A kutatási szakaszban feltárt jogszabályi kontextus alapján készítsen egy professzionális és közérthető 
    összefoglalót a felhasználó számára. Értelmezze a technikai jogi nyelvezetet, és válaszoljon a feltett 
    kérdésre a talált források alapján. Ügyeljen a logikai felépítésre és arra, hogy minden állítást 
    forráshivatkozással támasszon alá a szövegen belül.
  expected_output: >
    Egy professzionális, Markdown formátumú jogi tájékoztató jelentés, amely tartalmazza a közvetlen választ, 
    a részletes kifejtést a törvényi hivatkozásokkal, valamint egy rövid összefoglaló konklúziót. 
    A formázás során ne használjon kódblokk (```) jelöléseket a teljes szövegre.
  agent: jogi_megfelelosegi_elemzo