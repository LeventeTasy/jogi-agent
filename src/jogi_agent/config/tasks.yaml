jogi_kutatasi_feladat:
  description: >
    Végezzen célzott kutatást a(z) {topic} témakörben a RAG keresőeszköz használatával. 
    Gyűjtse ki a legrelevánsabb jogszabályi helyeket. A kinyert adatokat szigorúan 
    a megadott JSON formátumban kell visszaadnia.
  expected_output: >
    Egy JSON lista, amely tartalmazza a megtalált jogszabályi hivatkozásokat. 
    Minden objektumnak az alábbi mezőket kell tartalmaznia:
    {
      "source": "A forrásfájl neve (pl. GDPR_hun.pdf)",
      "law": "A törvény pontos megnevezése (pl. Munka Törvénykönyve)",
      "page": "Az oldalszám, ahol az információ található",
      "article": "A szakasz vagy cikk azonosítója (pl. 7. § vagy 4. cikk)",
      "quote": "A vonatkozó jogszabályi részlet pontos idézete",
      "topic": "Egy rövid kulcsszó, ami leírja az adott szakasz lényegét",
      "confidence": "Egy 0 és 1 közötti szám, ami a találat relevanciáját jelzi"
    }
    Fontos: Csak érvényes JSON formátumot fogadok el, magyarázó szöveg nélkül!
  agent: jogi_researcher

jogi_tanacsadoi_feladat:
  description: >
    A kutatási szakaszban feltárt jogszabályi kontextus alapján készítsen egy professzionális és közérthető 
    összefoglalót a felhasználó számára. Értelmezze a technikai jogi nyelvezetet, és válaszoljon a feltett 
    kérdésre a talált források alapján. Ügyeljen a logikai felépítésre és arra, hogy minden állítást 
    forráshivatkozással támasszon alá a szövegen belül.
  expected_output: >
    Egy professzionális, Markdown formátumú jogi tájékoztató jelentés, amely tartalmazza a közvetlen választ, 
    a részletes kifejtést a törvényi hivatkozásokkal, valamint egy rövid összefoglaló konklúziót. 
    A formázás során ne használjon kódblokk (```) jelöléseket a teljes szövegre.
  agent: jogi_analyst