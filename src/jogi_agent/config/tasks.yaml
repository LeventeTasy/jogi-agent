jogi_strategiai_tervezes_feladat:
  description: >
    Elemezze a felhasználó által feltett kérdést a(z) {topic} témakörben. 
    Azonosítsa, hogy a kérdés melyik jogterületet (GDPR, Mt., Ptk., vagy Vegyes) érinti, 
    és határozza meg a kérdés típusát (pl. definíciós, hatálybeli korlátozás, kivétel keresése). 
    Állítson össze egy precíz, célzott jogi kulcsszó-listát, amellyel a kutató ágens elindíthatja a RAG keresést, 
    minimalizálva az irrelevant találatok (pl. a 47. cikk embedding driftje) behúzásának esélyét.
  expected_output: >
    Egy strukturált stratégiai terv, amely tartalmazza a kérdés jogi kategóriáját, 
    a fókuszba veendő törvényeket és a javasolt RAG keresőszavakat.
  agent: jogi_strategist

jogi_kutatasi_feladat:
  description: >
    A jogi stratégia és a javasolt kulcsszavak alapján végezzen célzott keresést a RAG keresőeszköz használatával. 
    Gyűjtse ki a legrelevánsabb jogszabályi helyeket. Aktívan szűrje ki a kontextuális zajt. 
    Minden kinyert adatot szigorúan a megadott JSON formátumban kell továbbadnia az elemzőnek.
  expected_output: >
    Egy JSON lista, amely tartalmazza a megtalált jogszabályi hivatkozásokat. 
    Minden objektumnak az alábbi mezőket kell tartalmaznia:
    [
      {{
        "source": "A forrásfájl neve (pl. GDPR_2016.pdf)",
        "law": "A törvény pontos megnevezése (pl. GDPR rendelet)",
        "page": "A metaadatból nyert oldalszám vagy 'multiple'",
        "article": "A szakasz vagy cikk azonosítója (pl. 7. cikk vagy 11. §)",
        "quote": "A vonatkozó jogszabályi részlet pontos, szó szerinti idézete a RAG kontextusból",
        "topic": "Az ágens által meghatározott rövid kulcsszó a szakasz lényegéről",
        "distance": "A vektoros keresésből kapott távolság pontszáma"
      }}
    ]
    Fontos: Csak érvényes JSON formátumot fogadok el, magyarázó szöveg nélkül!
  agent: jogi_researcher

jogi_tanacsadoi_feladat:
  description: >
    A kutató által feltárt és a JSON listában átadott pontos jogszabályi kontextus alapján készítsen egy 
    professzionális, magas szintű jogi szakvéleményt a felhasználó kérdésére. 
    
    SZABÁLYOK (Kritikus):
    1. Legal Reasoning: Ne csak gépiesen ismételje meg a forrás mondatait! Vonjon le logikus, egyértelmű 
       következtetéseket a jogszabály szerkezetéből és szellemiségéből, ha azok tisztán adódnak. Ne használjon 
       gyáva vagy túlbiztosított kitérő válaszokat ott, ahol a kontextus egyértelmű.
    2. Citation Verification: Szigorúan ellenőrizze le, hogy a válaszában megemlített minden egyes cikk 
       vagy paragrafus (pl. GDPR 7. cikk) TÉNYLEGESEN szerepel-e a kutató által visszadott JSON forráslistában. 
       Ha egy cikk nincs benne a forrásban, TILOS megemlíteni vagy hivatkozni rá!
  expected_output: >
    Egy professzionális, Markdown formátumú jogi tájékoztató jelentés, amely szigorúan az alábbi formátumot követi:
    
    # JOGI SZAKVÉLEMÉNY: {topic}
    
    ### RÖVID VÁLASZ
    [Egy-két mondatos, teljesen egyértelmű válasz a kérdésre: Igen / Nem / Részben]
    
    ### JOGI INDOKOLÁS
    [Részletes, logikusan felépített, bekezdésekre bontott jogi elemzés a kinyert adatok alapján]
    
    ### JOGSZABÁLYI HIVATKOZÁSOK
    - [Törvény pontos neve] [Pontos cikk vagy paragrafus száma]
    
    ### KIVÉTELEK / BIZONYTALANSÁG
    [A szabály alóli releváns kivételek, vagy ha a kontextus parciális hiánya miatt valami nem dönthető el. Ha nincs, írja oda: "Nincs."]
    
    A formázás során ne használjon kódblokk (```) jelöléseket a teljes szövegre!
  agent: jogi_advisor