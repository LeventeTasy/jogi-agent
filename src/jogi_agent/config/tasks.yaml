jogi_strategiai_tervezes_feladat:
  description: >
    Elemezze a felhasználó által feltett kérdést a(z) {topic} témakörben. 
    Határozza meg a releváns jogterületeket és a kérdés dogmatikai típusát (pl. definíció, hatálybeli korlátozás, kivétel keresése). 
    Állítson össze egy célzott kulcsszó-listát a RAG keresőmotor számára, amely alkalmas a kontextuális zaj minimalizálására.
  expected_output: >
    Egy strukturált stratégiai terv, amely tartalmazza a kérdés jogi besorolását, a fókuszba veendő törvényeket és a javasolt keresőszavakat.
  agent: jogi_strategist

jogi_kutatasi_feladat:
  description: >
    A javasolt kulcsszavak alapján futtassa le a Jogi RAG Kereső Eszközt. 
        Gyűjtse ki a legrelevánsabb jogszabályi helyeket. 
        SZIGORÚ UTASÍTÁS: A kinyert adatokat másolja a megadott JSON formátumba. A "raw_text" mezőbe 
        MAXIMUM 3-4 releváns mondatot másolhat be a kontextusból. Tilos a teljes szövegblokkokat kritikátlanul bemásolni, 
        és szigorúan tilos szavakat vagy mondatrészeket indokolatlanul ismételni!
  expected_output: >
    Egy érvényes JSON lista, amely magyarázó szöveg nélkül tartalmazza a megtalált jogszabályi hivatkozásokat az alábbi mezőkkel:
    [
      {{
        "source": "A forrásfájl neve",
        "law": "A törvény pontos megnevezése",
        "page": "Az oldalszám",
        "article": "A szakasz vagy cikk azonosítója",
        "raw_text": "A teljes kinyert szövegblokk",
        "distance": "A vektoros távolság pontszáma"
      }}
    ]
  agent: jogi_researcher

jogszabalyi_megalapozottsag_feladat:
  description: >
    Elemezze a kutató ágens által átadott JSON listát. Hajtson végre mikroszintű szövegelemzést (Statute Grounding): 
    azonosítsa a pontos bekezdéseket, alpontokat, és válassza ki azt a konkrét, szó szerinti mondatot, amely közvetlenül megválaszolja a kérdést. 
    Szűrje ki a releváns cikkeken belüli felesleges bekezdéseket vagy irreleváns utalásokat.
  expected_output: >
    Egy finomított, validált JSON lista, ahol a "quote" mező kizárólag a releváns, hitelesített jogszabályi mondatokat tartalmazza, 
    valamint az "article" mező kiegészül a pontos bekezdésszámmal (pl. 88. cikk (1) bekezdés).
  agent: jogi_grounding_verifier

jogi_tanacsadoi_feladat:
  description: >
    A hitelesített jogszabályi adatok alapján készítse el a végső, formális jogi szakvéleményt.
    
    KÖTELEZŐ SZABÁLYOK:
    1. Jogszabályi levezetés: Az indokolásban explicit módon a pontos bekezdések szövegezésére és szó szerinti fordulataira támaszkodjon. 
       A következtetéseket deduktív módon, a jogszabályhelyek pontos idézésével támassza alá.
    2. Kockázati szűrés (Risk Scan): Vizsgálja felül a saját megfogalmazásait. Ha a szöveg abszolút kijelentéseket tartalmaz 
       (pl. 'mindig', 'soha', 'kizárólag', 'teljes mértékben'), ellenőrizze, hogy a forrásszöveg enged-e meg kivételeket. 
       Az esetleges normatív kivételeket és jogi kockázatokat külön fejezetben kell rögzíteni.
    3. Forrásvalidáció: Csak olyan jogszabályhelyre hivatkozhat, amely bizonyíthatóan szerepel a bemeneti listában.
  expected_output: >
    Egy professzionális, Markdown formátumú jogi tájékoztató jelentés, amely szigorúan az alábbi struktúrát követi:
    
    # JOGI SZAKVÉLEMÉNY: {topic}
    
    ### RÖVID VÁLASZ
    [Egy-két mondatos, kategorikus és egyértelmű válasz a kérdésre: Igen / Nem / Részben]
    
    ### JOGI INDOKOLÁS
    [Részletes, bekezdésekre bontott jogi elemzés, a pontos jogszabályi szövegek explicit beépítésével és levezetésével]
    
    ### JOGSZABÁLYI HIVATKOZÁSOK
    - [Törvény pontos neve] [Pontos cikk/paragrafus és bekezdés megjelölése]
    
    ### KOCKÁZATI TÉNYEZŐK ÉS KIVÉTELEK
    [A kockázati szűrés eredménye: a szabály alkalmazhatóságának korlátai, kivételek. Ha nincs kockázat, a mező értéke: "Nincs."]
    
    A formázás során kódblokk (```) jelölések használata a teljes szövegre tilos!
  agent: jogi_advisor